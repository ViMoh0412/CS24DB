<head>
<meta charset="UTF-8">

<title>CS24 — Secure Access</title>
<style>
:root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e1e4ed; --muted: #8b8fa3; --accent: #6366f1; --red: #ef4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.lc { width: 100%; max-width: 420px; padding: 20px; }
.lk { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px; text-align: center; }
.li { width: 56px; height: 56px; background: rgba(99,102,241,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.li svg { width: 28px; height: 28px; fill: var(--accent); }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.st { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.cb { display: inline-block; background: rgba(239,68,68,0.15); color: var(--red); font-size: 9px; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
.ig { margin-bottom: 20px; text-align: left; }
.ig label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.ig input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
.ig input:focus { border-color: var(--accent); }
.ig input.err { border-color: var(--red); }
.btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: var(--accent); color: white; transition: all 0.2s; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.em { color: var(--red); font-size: 12px; margin-top: 12px; display: none; }
.ld { display: none; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; color: var(--muted); font-size: 12px; }
.sp { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ft { text-align: center; margin-top: 20px; color: var(--muted); font-size: 10px; }
</style>
</head>

function b64d(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function dk(p,s){const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:E.it,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt'])}
async function go(){
  const p=document.getElementById('pwd').value;if(!p)return;
  document.getElementById('err').style.display='none';
  document.getElementById('ldr').style.display='flex';
  document.querySelector('.btn').disabled=true;
  try{
    const salt=b64d(E.s),iv=b64d(E.iv),ct=b64d(E.ct);
    const key=await dk(p,salt);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    const html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('ldr').style.display='none';
    document.querySelector('.btn').disabled=false;
    document.getElementById('pwd').classList.add('err');
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
